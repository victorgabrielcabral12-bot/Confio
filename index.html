<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudo Bíblico para Noisee 😁</title>

<style>
:root{
--cor:#22c55e;
--bg:#0f172a;
--card:#1e293b;
--text:white;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
}

header{
padding:15px;
text-align:center;
background:var(--card);
font-weight:bold;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:12px;
background:var(--cor);
color:white;
font-weight:bold;
}

.container{padding:15px;}
.hidden{display:none;}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}

.verso{
margin-bottom:14px;
padding:8px;
border-radius:10px;
background:rgba(255,255,255,0.03);
line-height:1.6;
}
</style>
</head>

<body>

<header>📖 Estudo Bíblico para Noisee 😁</header>

<div class="container">

<div id="home">
<h2>Para Vic e Yuki ❤️</h2>

<button onclick="abrir('biblia')">📖 Bíblia</button>
<button onclick="abrir('favoritos')">⭐ Favoritos</button>
<button onclick="abrir('recentes')">📌 Últimos</button>
<button onclick="abrir('temas')">🎨 Tema</button>
<button onclick="abrir('estudo')">🧠 Estudo Profundo</button>
</div>

<div id="biblia" class="hidden">
<button onclick="abrir('home')">⬅</button>
<div id="livros" class="grid"></div>
</div>

<div id="capitulos" class="hidden">
<button onclick="abrir('biblia')">⬅</button>
<div id="caps" class="grid"></div>
</div>

<div id="texto" class="hidden">
<button onclick="abrir('capitulos')">⬅</button>
<div id="conteudo"></div>
</div>

<div id="favoritos" class="hidden">
<button onclick="abrir('home')">⬅</button>
<div id="fav"></div>
</div>

<div id="recentes" class="hidden">
<button onclick="abrir('home')">⬅</button>
<div id="rec"></div>
</div>

<div id="estudo" class="hidden">
<button onclick="abrir('home')">⬅</button>
<p>Hebraico e Grego em breve 🔥</p>
</div>

<div id="temas" class="hidden">
<button onclick="setCor('#22c55e')">Verde</button>
<button onclick="setCor('#3b82f6')">Azul</button>
<button onclick="setCor('#ec4899')">Rosa</button>
<button onclick="setCor('#ef4444')">Vermelho</button>
<button onclick="setCor('#9333ea')">Roxo</button>
<button onclick="setEscuro()">Escuro</button>
<button onclick="setClaro()">Claro</button>
<button onclick="abrir('home')">⬅</button>
</div>

</div>

<script src="biblia.js"></script>
<script src="estudo.js"></script>

<script>
let tempo;

function abrir(id){
document.querySelectorAll('.container > div').forEach(e=>e.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');

if(id==="favoritos") mostrarFav();
if(id==="recentes") mostrarRec();
}

function setCor(c){document.documentElement.style.setProperty('--cor',c);}
function setEscuro(){
document.documentElement.style.setProperty('--bg','#0f172a');
document.documentElement.style.setProperty('--text','#fff');
}
function setClaro(){
document.documentElement.style.setProperty('--bg','#f1f5f9');
document.documentElement.style.setProperty('--text','#000');
}

const livrosDiv=document.getElementById("livros");

Object.keys(BIBLIA).forEach(l=>{
let b=document.createElement("button");
b.innerText=l;
b.onclick=()=>abrirCaps(l);
livrosDiv.appendChild(b);
});

function abrirCaps(l){
abrir("capitulos");
let capsDiv=document.getElementById("caps");
capsDiv.innerHTML="";

for(let c in BIBLIA[l]){
let b=document.createElement("button");
b.innerText=c;
b.onclick=()=>abrirTexto(l,c);
capsDiv.appendChild(b);
}
}

function abrirTexto(l,c){
abrir("texto");
let html="";

BIBLIA[l][c].forEach((v,i)=>{
let nota = localStorage.getItem("nota_"+v) || "";

html+=`
<div class="verso"
ontouchstart="segurar('${v}')"
ontouchend="cancelar()">
<b>${i+1}</b> ${v}
${nota?`<div style="color:yellow;">📝 ${nota}</div>`:""}
</div>`;
});

document.getElementById("conteudo").innerHTML=html;
salvarRec(l+" "+c);
}

function segurar(v){
tempo=setTimeout(()=>{
navigator.vibrate(200);

let escolha = prompt("1 = Favoritar\n2 = Anotar");

if(escolha=="1"){
localStorage.setItem("fav",JSON.stringify([v]));
}

if(escolha=="2"){
let nota = prompt("Digite sua anotação:");
localStorage.setItem("nota_"+v, nota);
}

},2000);
}

function cancelar(){clearTimeout(tempo);}

function mostrarFav(){
let f=JSON.parse(localStorage.getItem("fav")||"[]");
document.getElementById("fav").innerHTML=f.length?f[0]:"nada favoritado 😝";
}

function salvarRec(x){
let r=JSON.parse(localStorage.getItem("rec")||"[]");
r.unshift(x);
r=[...new Set(r)];
localStorage.setItem("rec",JSON.stringify(r.slice(0,5)));
}

function mostrarRec(){
let r=JSON.parse(localStorage.getItem("rec")||"[]");
document.getElementById("rec").innerHTML=r.join("<br>");
}
</script>

</body>
</html>
